context:
  name: pythonfinder
  version: "3.0.3"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pythonfinder-${{ version }}.tar.gz
  sha256: 345ef6c85a6e269304eedb571c02a5ad41a3537f6677f4b72efca032bf52deed

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - pyfinder = pythonfinder.cli:cli

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}
    - packaging >=22.0
    - click

tests:
  - python:
      imports:
        - pythonfinder
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - pyfinder --help

about:
  summary: A cross-platform python discovery tool to help locate python on any system.
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/sarugaku/pythonfinder

extra:
  recipe-maintainers:
    - hadim
